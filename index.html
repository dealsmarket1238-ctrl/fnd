<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Will you be my best friend forever? 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Pacifico&display=swap" rel="stylesheet" />

<style>
/* =========================================
   RESET & ROOT
========================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Nunito', sans-serif;
  user-select: none;
}

/* =========================================
   ANIMATED GRADIENT BACKGROUND
========================================= */
body {
  background: linear-gradient(-45deg,
    #ffd3b6, #ffb3c6, #d4b8f0,
    #b5ead7, #a8d8ea, #ffecd2);
  background-size: 500% 500%;
  animation: bgShift 14s ease infinite;
}

@keyframes bgShift {
  0%   { background-position:   0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position:   0% 50%; }
}

/* =========================================
   FLOATING HEARTS BACKGROUND
========================================= */
#heartsBg {
  position: fixed; inset: 0;
  pointer-events: none; overflow: hidden; z-index: 0;
}
.fh {
  position: absolute; bottom: -60px; opacity: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0%   { transform: translateY(0) rotate(0);       opacity: 0.5; }
  80%  { opacity: 0.3; }
  100% { transform: translateY(-108vh) rotate(360deg); opacity: 0; }
}

/* =========================================
   CORNER DOODLES
========================================= */
.doodle {
  position: fixed; z-index: 2; opacity: 0.38;
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  animation: dSpin linear infinite;
}
@keyframes dSpin { to { transform: rotate(360deg); } }

/* =========================================
   MAIN SCENE & CARD
========================================= */
.scene {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
}

.card {
  background: rgba(255,255,255,0.44);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border: 2px solid rgba(255,255,255,0.72);
  border-radius: 2.6rem;
  padding: clamp(2.2rem,7vw,3.6rem) clamp(2.2rem,9vw,4.8rem);
  display: flex; flex-direction: column;
  align-items: center; gap: 1.8rem;
  box-shadow: 0 16px 56px rgba(200,80,140,0.16),
              inset 0 1px 0 rgba(255,255,255,0.6);
  animation: cardPop 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardPop {
  from { opacity:0; transform: scale(0.75) translateY(28px); }
  to   { opacity:1; transform: scale(1)    translateY(0);    }
}

.mascot {
  font-size: clamp(3.8rem,11vw,5.8rem); line-height: 1;
  animation: wiggle 2.6s ease-in-out infinite;
  filter: drop-shadow(0 6px 18px rgba(255,120,160,0.44));
}
@keyframes wiggle {
  0%,100% { transform: translateY(0)    rotate(-4deg); }
  50%      { transform: translateY(-14px) rotate(4deg);  }
}

.headline {
  font-family: 'Pacifico', cursive;
  font-size: clamp(1.7rem,5.8vw,3.1rem);
  color: #c0395e;
  text-shadow: 0 3px 16px rgba(255,120,160,0.38), 0 1px 0 rgba(255,255,255,0.8);
  text-align: center; line-height: 1.28;
}

.subtext {
  font-size: clamp(0.88rem,2.5vw,1.06rem);
  color: #9d5075; font-weight: 700; letter-spacing: 0.04em;
}

/* =========================================
   BUTTONS
========================================= */
.btn-row {
  display: flex; gap: 1.1rem; flex-wrap: wrap; justify-content: center;
}

.btn {
  padding: 0.82rem 2.6rem;
  border: none; border-radius: 999px;
  font-family: 'Nunito', sans-serif;
  font-size: clamp(0.95rem,2.6vw,1.12rem);
  font-weight: 800; letter-spacing: 0.05em;
  cursor: pointer; position: relative; overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(118deg,
    transparent 28%, rgba(255,255,255,0.36) 50%, transparent 72%);
  transform: translateX(-110%);
  transition: transform 0.44s ease;
}
.btn:hover::after { transform: translateX(110%); }

/* YES */
.btn-yes {
  background: linear-gradient(135deg,#6ee7b0,#34d399,#059669);
  color: #fff; box-shadow: 0 6px 24px rgba(5,150,105,0.38);
}
.btn-yes:hover  { transform: scale(1.1);  box-shadow: 0 10px 32px rgba(5,150,105,0.54); }
.btn-yes:active { transform: scale(0.96); }

/* NO — becomes position:fixed once "rogue" */
.btn-no {
  background: linear-gradient(135deg,#fca5a5,#f87171,#dc2626);
  color: #fff; box-shadow: 0 6px 24px rgba(220,38,38,0.36);
}
.btn-no:hover  { transform: scale(1.07); }
.btn-no:active { transform: scale(0.96); }

.btn-no.rogue {
  position: fixed; z-index: 60;
  transition:
    left  0.5s cubic-bezier(0.34,1.45,0.64,1),
    top   0.5s cubic-bezier(0.34,1.45,0.64,1),
    transform  0.18s ease,
    box-shadow 0.18s ease;
}

/* =========================================
   OVERLAY + POPUP
========================================= */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 400;
  background: rgba(255,180,205,0.32);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  align-items: center; justify-content: center;
}
.overlay.show { display: flex; }

.popup {
  background: rgba(255,252,255,0.94);
  border: 2px solid rgba(255,255,255,0.88);
  border-radius: 2.6rem;
  padding: clamp(1.8rem,6vw,3rem) clamp(2rem,8vw,3.8rem);
  text-align: center; max-width: 92vw;
  box-shadow: 0 24px 64px rgba(192,57,94,0.22);
  display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn {
  from { opacity:0; transform: scale(0.5) rotate(-6deg); }
  to   { opacity:1; transform: scale(1)   rotate(0);     }
}

.popup-label {
  font-family: 'Pacifico', cursive;
  font-size: clamp(1.4rem,5.5vw,2.2rem);
  color: #c0395e;
  text-shadow: 0 2px 12px rgba(255,120,160,0.3);
}

.popup-gif {
  width: clamp(160px,50vw,280px);
  border-radius: 1.4rem;
  box-shadow: 0 8px 32px rgba(200,80,140,0.22);
  display: block;
}

.btn-close {
  padding: 0.7rem 2.4rem;
  border: none; border-radius: 999px;
  background: linear-gradient(135deg,#ff8fab,#f472b6,#db2777);
  color: #fff; font-family: 'Nunito', sans-serif;
  font-size: 1rem; font-weight: 800; cursor: pointer;
  box-shadow: 0 5px 20px rgba(219,39,119,0.4);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.btn-close:hover  { transform: scale(1.08); box-shadow: 0 8px 28px rgba(219,39,119,0.55); }
.btn-close:active { transform: scale(0.96); }
</style>
</head>

<!-- Floating hearts -->

<!-- Corner doodles -->
<span class="doodle" style="top:4%;left:4%;    animation-duration:12s">🌸</span>

<span class="doodle" style="bottom:5%;left:5%; animation-duration:10s">🍀</span>
<span class="doodle" style="bottom:4%;right:4%;animation-duration:7s; animation-direction:reverse">⭐</span>

</div>

<script>
/* =============================================
   1. FLOATING BACKGROUND HEARTS
============================================= */
(function () {
  const stage   = document.getElementById('heartsBg');
  const symbols = ['💕','💗','💖','🩷','💓','💞','🌸','✨','🌷','⭐'];
  for (let i = 0; i < 24; i++) {
    const el = document.createElement('span');
    el.className   = 'fh';
    el.textContent = symbols[i % symbols.length];
    el.style.left              = Math.random() * 100 + 'vw';
    el.style.fontSize          = (0.9 + Math.random() * 1.7) + 'rem';
    el.style.animationDuration = (7 + Math.random() * 10) + 's';
    el.style.animationDelay    = (-Math.random() * 14) + 's';
    stage.appendChild(el);
  }
})();


/* =============================================
   2. NO-BUTTON — CLICK TO FLEE WITH SAFE ZONE
============================================= */
(function () {
  const btnNo  = document.getElementById('btnNo');
  const btnYes = document.getElementById('btnYes');
  let   rogue  = false;
  const EDGE   = 16;      // min px from viewport edges
  const SAFE   = 160;     // min px from Yes button centre

  /* Snap button to fixed coords matching its current screen position */
  function makeRogue() {
    if (rogue) return;
    rogue = true;

    const rect = btnNo.getBoundingClientRect();
    btnNo.style.transition = 'none';        // instant snap first
    btnNo.classList.add('rogue');
    btnNo.style.left = rect.left + 'px';
    btnNo.style.top  = rect.top  + 'px';
    document.body.appendChild(btnNo);       // detach from card

    // restore CSS transition after browser paints the snap
    requestAnimationFrame(() =>
      requestAnimationFrame(() => { btnNo.style.transition = ''; })
    );
  }

  /* Pick a random position that is NOT inside the safe zone around Yes */
  function safeRandomPos() {
    const bw    = btnNo.offsetWidth  || 130;
    const bh    = btnNo.offsetHeight || 52;
    const maxX  = window.innerWidth  - bw - EDGE;
    const maxY  = window.innerHeight - bh - EDGE;

    // Yes button's centre in viewport coords
    const yr   = btnYes.getBoundingClientRect();
    const ycx  = yr.left + yr.width  / 2;
    const ycy  = yr.top  + yr.height / 2;

    let x, y, attempts = 0;
    do {
      x = EDGE + Math.random() * (maxX - EDGE);
      y = EDGE + Math.random() * (maxY - EDGE);
      // centre of No button candidate position
      const ncx = x + bw / 2;
      const ncy = y + bh / 2;
      const dist = Math.hypot(ncx - ycx, ncy - ycy);
      if (dist >= SAFE) break;
      attempts++;
    } while (attempts < 200);   // fallback after 200 tries

    return { x, y };
  }

  function flee() {
    makeRogue();
    const { x, y } = safeRandomPos();
    btnNo.style.left = x + 'px';
    btnNo.style.top  = y + 'px';
  }

  btnNo.addEventListener('click', flee);
  window.addEventListener('resize', () => { if (rogue) flee(); });
})();


/* =============================================
   3. YES BUTTON — SHOW POPUP
============================================= */
document.getElementById('btnYes').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('show');
});

document.getElementById('btnClose').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
});
</script>
